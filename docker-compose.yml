version: '3.8'
services:
  bin-chan:
    build: .
    image: bin-chan:latest
    ports:
      - "1972:1972"
    container_name: bin-chan
    environment:
      FLASK_APP: app.py
      FLASK_ENV: production
      FLASK_DEBUG: '0'
      DATABASE_URL: /app/db/db.sqlite3
    volumes:
      - /var/db:/app/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:1972/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s