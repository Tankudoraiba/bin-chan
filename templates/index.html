<head>

        content="text bin, Pastebin alternative, auto-delete text, share text, shared bin, temporary text storage, expire text, private text sharing, disposable text sharing, anonymous text bin, secure text sharing, ephemeral text storage, Bin-chan, self-deleting text, code snippets, notes sharing, encrypted text bin, timed text deletion, short-term text sharing, share notes securely, secure online notepad">
    <link rel="canonical" href="{{ url_for('index', _external=True) }}">
    <!-- Open Graph meta tags -->
    <meta property="og:title" content="Bin-chan | A Forgetful Text Bin">
    <meta property="og:description"
        content="A bin share like Pastebin, but it forgets! Share text with custom expiry options">

    <!-- Twitter Card meta tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Bin-chan | A Forgetful Text Bin">
    <meta name="twitter:description"
        content="A bin share like Pastebin, but it forgets! Share text with custom expiry options">
    <meta name="twitter:image" content="{{ url_for('static', filename='images/og_logo.png') }}">
    <!-- Google Verification -->
    <meta name="google-site-verification" content="e6uZRl4dzIQV8N8ylkx9dU7eO215TgM21Ckp5rwMeVs">

    <meta name="theme-color" content="#4d4d4d">
    <title>Bin-chan | Fill bin</title>
    <!-- Stylesheets and Fonts -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preload" href="{{ url_for('static', filename='css/style.css') }}" as="style">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">
    <!-- Favicon and App Icons -->
    <link rel="icon" type="image/png" href="/static/images/favicon-48x48.png" sizes="48x48">
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">
    <link rel="shortcut icon" href="/static/images/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/images/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="Bin-chan">

    <!-- JavaScript -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

    <body>
        <h1 class="visually-hidden">Bin-chan | A Forgetful Text Bin</h1>
        <main class="content">
            <div class="container">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo">
                <form id="textForm">
                    <textarea name="text" placeholder="Enter your text..." required></textarea><br>
                    <div id="charCount">0/6000</div>
                    <input type="text" name="url_name" placeholder="Custom URL (optional)">
                    <input type="password" name="password" placeholder="Password (optional)">
                    <div class="buttons">
                        <!-- Keep the real select hidden for form submission -->
                        <select name="expiry_option" required class="styled-dropdown hidden-styled-dropdown" id="realExpirySelect">
                            <option value="10m">10 Minutes</option>
                            <option value="1h">1 Hour</option>
                            <option value="3h">3 Hours</option>
                            <option value="24h">24 Hours</option>
                            <option value="7d">7 Days</option>
                        </select>
                        <!-- Custom rounded dropdown visual -->
                        <div class="custom-dropdown" id="customExpiry" tabindex="0" aria-haspopup="listbox" aria-expanded="false">
                            <div class="selected" id="customExpirySelected">10 Minutes</div>
                            <div class="options" role="listbox" id="customExpiryOptions">
                                <div class="option" role="option" data-value="10m">10 Minutes</div>
                                <div class="option" role="option" data-value="1h">1 Hour</div>
                                <div class="option" role="option" data-value="3h">3 Hours</div>
                                <div class="option" role="option" data-value="24h">24 Hours</div>
                                <div class="option" role="option" data-value="7d">7 Days</div>
                            </div>
                        </div>
                        <button type="submit">Share Text</button>
                    </div>
                </form>
                <div id="errorPopup" class="popup" style="display:none;">
                    <span id="errorMessage"></span>
                </div>
            </div>
        </main>
        <footer class="footer">
            Made by drunk Tanku |<a href="https://github.com/tankudoraiba/bin-chan" target="_blank">GitHub</a>
        </footer>

        <script>
            $(document).ready(function () {
                // Custom dropdown logic to show a rounded options list and keep original select in sync
                const $realSelect = $('#realExpirySelect');
                const $custom = $('#customExpiry');
                const $selected = $('#customExpirySelected');
                const $options = $('#customExpiryOptions');

                function openCustom() {
                    $custom.addClass('open');
                    $custom.attr('aria-expanded', 'true');
                }
                function closeCustom() {
                    $custom.removeClass('open');
                    $custom.attr('aria-expanded', 'false');
                }

                $custom.on('click', function (e) {
                    e.stopPropagation();
                    if ($custom.hasClass('open')) closeCustom(); else openCustom();
                });

                // Close dropdown after a short delay when mouse leaves so the user can move into the options
                let _closeDropdownTimeout = null;
                $custom.on('mouseleave', function () {
                    _closeDropdownTimeout = setTimeout(function () {
                        closeCustom();
                        _closeDropdownTimeout = null;
                    }, 200); // 200ms grace period
                });
                // Cancel closing if mouse re-enters quickly
                $custom.on('mouseenter', function () {
                    if (_closeDropdownTimeout) {
                        clearTimeout(_closeDropdownTimeout);
                        _closeDropdownTimeout = null;
                    }
                });

                $options.on('click', '.option', function (e) {
                    const val = $(this).data('value');
                    const text = $(this).text();
                    $selected.text(text);
                    $realSelect.val(val).trigger('change');
                    closeCustom();
                });

                // Close when clicking outside
                $(document).on('click', function () { closeCustom(); });

                // Keyboard accessibility
                $custom.on('keydown', function (e) {
                    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); $custom.click(); }
                    if (e.key === 'Escape') closeCustom();
                });

                // Initialize with select's current value
                const initVal = $realSelect.val();
                const initText = $realSelect.find('option:selected').text();
                $selected.text(initText);

                $('#textForm').on('submit', function (event) {
                    event.preventDefault();

                    $.ajax({
                        type: 'POST',
                        url: '/',
                        data: $(this).serialize(),
                        success: function (response) {
                            if (response.url) {
                                // Directly redirect to the shared text if the user created it
                                window.location.href = response.url; // Redirect to the new URL
                            } else {
                                // Handle other success cases if needed
                            }
                        },

                        error: function (xhr) {
                            // Handle error response
                            $('#errorMessage').text(xhr.responseJSON.error); // Set the error message
                            $('#errorPopup').show(); // Show the popup

                            // Make the error popup disappear after 5 seconds with fade out
                            setTimeout(function () {
                                $('#errorPopup').fadeOut(4000); // Fades out over 4 seconds
                            }, 1000); // Starts fade-out after 1 second
                        }
                    });
                });

                // Character counting functionality
                $('textarea[name="text"]').on('input', function () {
                    let charCount = $(this).val().length;
                    let maxCharCount = 6000;
                    let charCountElement = $('#charCount');
                    charCountElement.text(charCount + '/6000');

                    // Change color if character count exceeds 6000
                    if (charCount > maxCharCount) {
                        charCountElement.css('color', '#b80000');
                    } else {
                        charCountElement.css('color', '');
                    }
                });
            });
        </script>

    </body>

</html>
